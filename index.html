<html> 
    <head>
        <title>adakangg.github.io | Ada Kang</title>

    <body>
        <nav>  
            <p class="title">Hey there! 👋 <span class="filled title"> I'm Ada</span> </p>  
            
            <label class="switch">

                <span class="slider round"></span>

                <img src="assets/moon.png" alt="moon" id='switch-dark-img'/>

        </nav>     

        <div id="main-content">  
            <div id="sidebar">   
                <div id="profile">
                    <img src="assets/profile.svg" alt="Ada" id="profile-pic"/> 
                    <div id="bio" class="container">
                        <p class="header">ABOUT ME</p>
                        <div> 
                            <p class="small-text">📍<i> Based in Atlanta, GA</i></p>     
                            <p id="bio-text">Software developer turning ideas into apps that make our lives just a bit easier~ </p>
                            
                        </div>   
                    </div>
                </div> 

                <div id="skills" class="container">
                    <p class="header"> TECHNOLOGY </p>
                    <div id="skills-grid" class="content"></div>
                </div>
 
                 <div id="" class="container">
                    <div class="header">CONTACT ME </div>
                    <div id="icon-links-row"></div>  
                </div>
            </div>   

            <div id="portfolio" class="portfolio-section">  
                <p class="header filled">PROJECTS</p>  
                <div id="projects-grid"></div>
            </div>  
        </div>
